services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${MARKET_PIPE__POSTGRES_DB:-market_pipe}
      POSTGRES_USER: ${MARKET_PIPE__POSTGRES_USER:-market_pipe}
      POSTGRES_PASSWORD: ${MARKET_PIPE__POSTGRES_PASSWORD:-market_pipe}
    ports:
      - "${MARKET_PIPE__POSTGRES_PORT:-5432}:5432"
    volumes:
      - market_pipe_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  market_pipe_postgres:
